<!DOCTYPE html>
<html>

<head>
    <title>Freedium Settings</title>
    <style>
        body {
            padding: 20px;
            font-family: system-ui;
        }

        .option-row {
            margin: 20px 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 34px;
            transition: .4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: .4s;
        }

        input:checked+.slider {
            background-color: #2196F3;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        #status {
            color: green;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>Freedium Settings</h2>

    <div class="option-row">
        <label>Open in new tab:</label>
        <label class="switch">
            <input type="checkbox" id="openInNewTab">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option-row">
        <label>Open links on button click:</label>
        <label class="switch">
            <input type="checkbox" id="openLinksOnButtonClick">
            <span class="slider"></span>
        </label>
    </div>

    <div id="status"></div>

    <script src="options.js"></script>
</body>

</html>
